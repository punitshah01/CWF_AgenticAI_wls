name: CI — Lint & Smoke Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: |
          ruff check \
            common/ \
            misc/ \
            benchmarks/ \
            scripts/setup.py \
            scripts/inference/ \
            scripts/prefetch_assets.py \
            setup/ \
            --ignore E501,E402

  import-smoke:
    name: Import Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal deps
        run: pip install pyyaml
      - name: Verify common imports
        run: |
          python3 -c "
          import sys; sys.path.insert(0, '.')
          from common.platform_info import detect_platform, get_platform_info
          from common.csv_writer import write_csv_row
          from common.json_results import ResultsJsonWriter
          print('All common imports OK')
          "
      - name: Verify setup.py --list
        run: python3 scripts/setup.py --list
      - name: Verify misc scripts importable
        run: |
          python3 -c "
          import sys; sys.path.insert(0, '.')
          import ast, pathlib
          for f in pathlib.Path('misc').glob('*.py'):
              ast.parse(f.read_text())
          for bench in ['swe-bench','webarena','osworld','appworld','t-bench']:
              for f in pathlib.Path(f'benchmarks/{bench}').glob('*.py'):
                  ast.parse(f.read_text())
          for f in pathlib.Path('scripts/inference').glob('*.py'):
              ast.parse(f.read_text())
          for f in pathlib.Path('setup').glob('*.py'):
              ast.parse(f.read_text())
          print('All Python scripts parse OK')
          "

  py-compile:
    name: py_compile (syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"   # lowest supported version
      - name: Compile all Python files
        run: |
          find . -name "*.py" \
            -not -path "./.venv/*" \
            -not -path "./node_modules/*" \
            -print0 \
          | xargs -0 python -m py_compile
          echo "py_compile: all files OK"

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck on all .sh files
        run: |
          find . -name "*.sh" \
            -not -path "./.venv/*" \
            -print0 \
          | xargs -0 shellcheck --severity=warning
          echo "shellcheck: all files OK"

  dry-run-smoke:
    name: Dry-run smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal deps
        run: pip install pyyaml
      - name: Smoke — appworld dry-run
        run: |
          python benchmarks/appworld/run_appworld.py \
            --dry-run \
            --output-dir /tmp/test_appworld
      - name: Smoke — common/setup.py dry-run
        run: |
          python scripts/setup.py \
            --dry-run \
            --skip-system \
            --skip-docker \
            --skip-conda \
            --skip-pip

